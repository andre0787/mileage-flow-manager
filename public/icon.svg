<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Navy -->
  <rect width="512" height="512" rx="96" fill="#0B1020"/>
  <!-- Compass ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1E2A4A" stroke-width="6"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#CE9E1D" stroke-width="2" opacity="0.3"/>
  <!-- Compass rose / star (4-point) -->
  <polygon points="256,76 276,236 436,256 276,276 256,436 236,276 76,256 236,236" fill="#CE9E1D" opacity="0.15"/>
  <!-- Paper airplane body -->
  <g transform="translate(256,256) rotate(45)">
    <polygon points="-10,-10 100,0 -10,10" fill="#CE9E1D"/>
    <!-- Wing -->
    <polygon points="-40,-40 -10,-10 20,0" fill="#22A68F"/>
    <polygon points="-40,40 -10,10 20,0" fill="#1E8A76"/>
    <!-- Trail -->
    <line x1="-10" y1="0" x2="-70" y2="-30" stroke="#22A68F" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="-10" y1="0" x2="-70" y2="30" stroke="#1E8A76" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Highlight dot -->
  <circle cx="320" cy="192" r="4" fill="#FFE08A" opacity="0.6"/>
</svg>
