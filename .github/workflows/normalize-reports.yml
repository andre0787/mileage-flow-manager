name: Normalize Reports

on:
  push:
    branches: [main]
    paths:
      - "docs/reports/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detecta PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          PR_NUM=$(echo "${{ github.event.head_commit.message }}" | grep -oP '#\K\d+' | tail -1)
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list --search "SHA:${SHA}" --state merged --json number -q '.[0].number' 2>/dev/null || echo "")
          fi
          echo "num=${PR_NUM:-}" >> $GITHUB_OUTPUT

      - name: Renomeia relatórios sem prefixo PR<num>
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ steps.pr.outputs.num }}"
          if [ -z "$PR_NUM" ]; then
            echo "Nenhum PR detectado"
            exit 0
          fi

          TODAY=$(date +%F)
          REPORTS_DIR="docs/reports/$TODAY"
          if [ ! -d "$REPORTS_DIR" ]; then
            echo "Nenhum relatório hoje"
            exit 0
          fi

          CHANGED=0
          for file in "$REPORTS_DIR"/*.html; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            if echo "$BASENAME" | grep -q "^PR${PR_NUM}-"; then
              continue
            fi
            if echo "$BASENAME" | grep -qE "^PR[0-9]+-"; then
              continue
            fi
            NEW_NAME=$(echo "$BASENAME" | sed "s/^[^-]*-/PR${PR_NUM}-/")
            if [ "$BASENAME" != "$NEW_NAME" ]; then
              git mv "$file" "$REPORTS_DIR/$NEW_NAME"
              echo "Renomeado: $BASENAME → $NEW_NAME"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 1 ]; then
            BRANCH="chore/normalize-report-pr${PR_NUM}"
            git checkout -b "$BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: normalize report prefix to PR${PR_NUM}"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: normalize report prefix to PR${PR_NUM}" \
              --body "Renomeação automática de relatório com prefixo correto." \
              --head "$BRANCH" \
              --base main \
              --label docs
            echo "✅ PR criado: normalize report prefix to PR${PR_NUM}"
          else
            echo "Nenhum relatório para normalizar"
          fi
