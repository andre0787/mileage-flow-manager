name: Nightly — Full Check

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:       # permitir trigger manual

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Nightly check (fast + build + E2E + quality)
        run: npm run check:nightly

      - name: Create PR with QUALITY.md update
        if: always()
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: atualiza QUALITY.md (nightly)"
          title: "📊 Atualização noturna QUALITY.md"
          body: |
            Atualização automática das métricas de qualidade.
            Gerado por `npm run check:nightly`.
          branch: chore/quality-nightly-update
          delete-branch: true
          labels: automated, docs
          add-paths: QUALITY.md

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: docs/reports/
