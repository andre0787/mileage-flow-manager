name: Auto Report

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Título do relatório'
        required: false
        default: 'Relatório Automático'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate quality report
        run: node scripts/quality-report.mjs --write
      - name: Create report HTML
        run: |
          DATE=$(date +%Y-%m-%d)
          cat > docs/reports/auto-$DATE-qualidade.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head><meta charset="UTF-8"><title>Relatório Automático</title>
          <style>
            body{font-family:-apple-system,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}
            h1{border-bottom:3px solid #0070f3;padding-bottom:.5rem}
            pre{background:#f5f5f5;padding:1rem;border-radius:6px}
          </style></head>
          <body>
          <h1>📊 Relatório Automático</h1>
          <p>Gerado em: $(date '+%Y-%m-%d %H:%M UTC')</p>
          <pre>$(cat QUALITY.md)</pre>
          </body></html>
          EOF
      - name: Create PR with report
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: relatório automático $(date +%Y-%m-%d)"
          title: ${{ github.event.inputs.title || '📊 Relatório Automático de Qualidade' }}
          body: |
            ## Relatório Automático
            Gerado via workflow dispatch.
            Inclui QUALITY.md atualizado + relatório HTML.
          branch: docs/auto-report-${{ github.run_id }}
          delete-branch: true
          labels: docs, automated
